name: "PolicyForge Scan"
description: "Scan Terraform/Bicep IaC against PolicyForge policy-as-code rule packs and upload SARIF results."
branding:
  icon: "shield"
  color: "blue"

inputs:
  path:
    description: "Path to the directory of IaC files to scan"
    required: false
    default: "."
  fail-on-high:
    description: "Fail the workflow if HIGH or CRITICAL findings are present"
    required: false
    default: "true"

runs:
  using: "composite"
  steps:
    - name: Install PolicyForge
      shell: bash
      run: |
        go install github.com/chethankumblekar/policyforge/cmd/policyforge@latest

    - name: Run scan
      shell: bash
      run: |
        policyforge scan --path "${{ inputs.path }}" --format sarif > results.sarif
      continue-on-error: true

    - name: Upload SARIF results
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: results.sarif
